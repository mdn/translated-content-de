# This is a port of the equivalent workflow in mdn/content.
# See https://github.com/mdn/content/blob/main/.github/workflows/auto-cleanup-bot.yml

name: Create content auto-fix PR

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  fix:
    if: github.repository == 'mdn/translated-content-de'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang:
          - de
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          persist-credentials: false

      - name: Checkout (content)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: mdn/content
          path: mdn/content
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Install
        run: npm ci
        env:
          # https://github.com/microsoft/vscode-ripgrep#github-api-limit-note
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0

      - name: Install (content)
        working-directory: ${{ github.workspace }}/mdn/content
        run: npm ci
        env:
          # https://github.com/microsoft/vscode-ripgrep#github-api-limit-note
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix flaws
        env:
          CONTENT_ROOT: ${{ github.workspace }}/mdn/content/files
          CONTENT_TRANSLATED_ROOT: ${{ github.workspace }}/files
        working-directory: ${{ github.workspace }}/mdn/content
        run: npm run content fix-flaws -- --locale "${{ matrix.lang }}"

      - name: Diff
        run: |
          git status
          git diff HEAD --color=always --word-diff --word-diff-regex='[[:alnum:]_]+'

      - name: Markdownlint
        run: npx markdownlint-cli2 --fix "**/${{ matrix.lang }}/**/*.md"

      - name: Diff
        run: |
          git status
          git diff HEAD --color=always --word-diff --word-diff-regex='[[:alnum:]_]+'

      - name: Check URL locale
        run: node ./scripts/check-url-locale.js --fix "files/${{ matrix.lang }}"

      - name: Diff
        run: |
          git status
          git diff HEAD --color=always --word-diff --word-diff-regex='[[:alnum:]_]+'

      - name: Autocorrect
        run: ls -d 2>/dev/null "files/${{ matrix.lang }}" "docs/${{ matrix.lang }}" | xargs npx autocorrect --fix

      - name: Diff
        run: |
          git status
          git diff HEAD --color=always --word-diff --word-diff-regex='[[:alnum:]_]+'

      - name: Prettier
        run: npx prettier -w "**/${{ matrix.lang }}/**/*.md"

      - name: Diff
        run: |
          git status
          git diff HEAD --color=always --word-diff --word-diff-regex='[[:alnum:]_]+'

      - name: Frontmatter
        working-directory: ${{ github.workspace }}/mdn/content
        run: npm run fix:fm -- --config-file ${{ github.workspace }}/.front-matter-config.json "${{ github.workspace }}/files/${{ matrix.lang }}"

      - name: Diff
        if: always()
        run: |
          git status
          git diff HEAD --color=always --word-diff --word-diff-regex='[[:alnum:]_]+'

      - name: Create PR with only fixable issues
        if: success()
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "${{ matrix.lang }}: auto-fix content issues"
          branch: content-autofix-${{ matrix.lang }}
          title: "[${{ matrix.lang }}] auto-fix content issues"
          author: mdn-bot <108879845+mdn-bot@users.noreply.github.com>
          committer: mdn-bot <108879845+mdn-bot@users.noreply.github.com>
          body: |
            This PR was generated by [this run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) of the [`auto-cleanup-bot`](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/.github/workflows/auto-cleanup-bot.yml) workflow.

            All issues were auto-fixed.
          labels: |
            automated pr
          token: ${{ secrets.AUTOMERGE_TOKEN }}

      - name: Create PR with notice on unfixed issues
        if: failure()
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "${{ matrix.lang }}: auto-fix content issues"
          branch: content-autofix-${{ matrix.lang }}
          title: "[${{ matrix.lang }}] auto-fix content issues"
          author: mdn-bot <108879845+mdn-bot@users.noreply.github.com>
          committer: mdn-bot <108879845+mdn-bot@users.noreply.github.com>
          body: |
            This PR was generated by the [`auto-cleanup-bot`](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/.github/workflows/auto-cleanup-bot.yml) workflow.

            Auto-fix was run, but additional issues found.
            Please review the [run log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          labels: |
            automated pr
          token: ${{ secrets.AUTOMERGE_TOKEN }}
